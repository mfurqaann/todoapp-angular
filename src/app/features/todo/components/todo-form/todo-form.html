<div class="mb-6">
  <div class="flex">
    <input
      type="text"
      class="w-full rounded-l-md border border-gray-300 px-4 py-2 outline-none transition focus:border-blue-900 focus:ring-2 focus:ring-blue-900"
      placeholder="Add new task..."
      required
      minlength="5"
      name="todoForm"
      #todoForm="ngModel"
      [(ngModel)]="inputTask"
      (keyup.enter)="todoForm.valid && addTodo()"
    />

    <button
      class="rounded-r-md cursor-pointer bg-blue-900 px-5 text-white transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:bg-gray-300"
      (click)="addTodo()"
      [disabled]="todoForm.invalid"
    >
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>

  @if (todoForm.invalid && (todoForm.dirty || todoForm.touched)) {
    <small class="mt-1 block text-sm text-red-500"> Minimum input 5 characters </small>
  }
</div>

<div class="mb-4 flex flex-col gap-3 md:flex-row">
  <div class="flex flex-1 items-center overflow-hidden rounded-md border border-gray-300 bg-white">
    <span class="px-3 text-gray-400">
      <i class="fa fa-search"></i>
    </span>

    <input
      type="text"
      class="w-full px-3 py-2 outline-none"
      [(ngModel)]="searchTodo"
      placeholder="Search tasks..."
      (ngModelChange)="onSearchTodo()"
    />
  </div>

  <select
    class="rounded-md border border-gray-300 px-4 py-2 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200 md:w-52"
    (input)="onSortTodo($event)"
  >
    <option>Sort by</option>
    <option value="title">Name</option>
  </select>
</div>
