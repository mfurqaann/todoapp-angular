<li
  class="mb-2 flex items-center justify-between rounded-lg border border-gray-200 bg-white p-4 shadow-sm"
>
  <div class="flex items-center gap-3">
    <input
      type="checkbox"
      class="h-4 w-4 cursor-pointer rounded border-gray-300"
      (click)="onToggleTodo(todo)"
      [checked]="todo.status"
    />

    <span
      [class.line-through]="todo.status === true"
      [class.text-gray-400]="todo.status === true"
      class="font-medium"
    >
      {{ todo.title | titlecase }}
    </span>
  </div>

  <div class="flex items-center gap-2">
    <span
      class="rounded-full px-3 py-1 text-xs font-semibold"
      [ngClass]="
        todo.status === true ? 'bg-blue-300 text-blue-800' : 'bg-yellow-100 text-yellow-700'
      "
    >
      {{ todo.status === true ? 'Done' : 'Active' }}
    </span>

    <button
      class="rounded-md border cursor-pointer border-red-500 px-3 py-1 text-red-500 transition hover:bg-red-500 hover:text-white"
      (click)="onClickTodo(todo)"
    >
      <i class="fa fa-trash"></i>
    </button>
  </div>
</li>
