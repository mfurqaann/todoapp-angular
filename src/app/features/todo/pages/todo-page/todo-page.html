<div class="mx-auto mt-16 max-w-2xl px-4">
  <app-header></app-header>

  <div class="animate-fade-in rounded-2xl bg-white p-6 shadow-lg backdrop-blur-md">
    <app-todo-form
      (onTodoAdded)="addTodo($event)"
      (onTodoSearch)="onSearchTodo($event)"
      (onTodoSortBy)="onSortTodo($event)"
    ></app-todo-form>

    <app-todo-list
      [todos]="todos$ | async"
      (deleteTodo)="deleteTodo($event)"
      (toggleTodo)="onToggleTodo($event)"
    ></app-todo-list>

    <app-footer></app-footer>
  </div>
</div>
